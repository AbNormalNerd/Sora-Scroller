<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LUMINA - Upload Content</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        
        /* Custom scrollbar for textareas */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: theme('colors.surface-variant');
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: theme('colors.outline');
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#bec8ce",
                        "tertiary-fixed": "#ffddb5",
                        "inverse-on-surface": "#313030",
                        "tertiary-container": "#febc60",
                        "secondary-fixed": "#c9e6ff",
                        "surface-container-highest": "#353534",
                        "outline": "#899298",
                        "on-error-container": "#ffdad6",
                        "error": "#ffb4ab",
                        "background": "#131313",
                        "surface-bright": "#3a3939",
                        "on-secondary-fixed": "#001e2f",
                        "surface-tint": "#7bd1fa",
                        "secondary-fixed-dim": "#89ceff",
                        "outline-variant": "#3f484e",
                        "on-primary-fixed": "#001e2b",
                        "secondary-container": "#00a2e6",
                        "primary-container": "#7dd3fc",
                        "on-secondary": "#00344d",
                        "on-secondary-fixed-variant": "#004c6e",
                        "on-primary-container": "#005b78",
                        "primary-fixed-dim": "#7bd1fa",
                        "surface": "#131313",
                        "surface-container": "#201f1f",
                        "on-background": "#e5e2e1",
                        "tertiary": "#ffdfba",
                        "on-tertiary-fixed": "#2a1800",
                        "error-container": "#93000a",
                        "surface-container-high": "#2a2a2a",
                        "on-tertiary-container": "#754b00",
                        "on-primary": "#003547",
                        "tertiary-fixed-dim": "#fcba5e",
                        "inverse-surface": "#e5e2e1",
                        "on-error": "#690005",
                        "surface-variant": "#353534",
                        "secondary": "#89ceff",
                        "primary": "#c5eaff",
                        "on-tertiary-fixed-variant": "#633f00",
                        "primary-fixed": "#c0e8ff",
                        "on-surface": "#e5e2e1",
                        "surface-container-lowest": "#0e0e0e",
                        "on-primary-fixed-variant": "#004d66",
                        "surface-container-low": "#1c1b1b",
                        "on-tertiary": "#452b00",
                        "inverse-primary": "#006686",
                        "surface-dim": "#131313",
                        "on-secondary-container": "#00344e"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "2xl": "1.5rem"
                    },
                    "spacing": {
                        "unit": "4px",
                        "player-max-width": "480px",
                        "gutter": "24px",
                        "margin-desktop": "48px",
                        "margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Inter"],
                        "title-md": ["Inter"],
                        "label-caps": ["JetBrains Mono"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-sm": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["24px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "title-md": ["20px", { "lineHeight": "1.4", "fontWeight": "500" }],
                        "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "body-lg": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background min-h-screen text-on-background antialiased overflow-hidden font-body-lg flex items-center justify-center relative">
<!-- Ambient Background Elements to enhance glassmorphism -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-20%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[40vw] h-[40vw] rounded-full bg-secondary-container/5 blur-[100px]"></div>
</div>
<!-- Modal Canvas / Container (Level 3 Elevation) -->
<main class="relative z-10 w-full max-w-[720px] px-margin-mobile md:px-0">
<div class="w-full bg-surface-container/80 backdrop-blur-2xl rounded-2xl border border-white/10 shadow-2xl overflow-hidden flex flex-col relative before:absolute before:inset-0 before:pointer-events-none before:rounded-2xl before:ring-1 before:ring-primary/20 before:z-20">
<!-- Header -->
<header class="flex justify-between items-center px-8 py-6 border-b border-white/5 relative z-30">
<h1 class="font-title-md text-title-md text-on-surface">Upload Content</h1>
<button aria-label="Close modal" class="text-on-surface-variant hover:text-on-surface transition-colors focus:outline-none">
<span class="material-symbols-outlined text-[20px]" data-icon="close">close</span>
</button>
</header>
<!-- Body -->
<div class="p-8 flex flex-col gap-8 relative z-30 overflow-y-auto max-h-[716px]">
<!-- Drag and Drop Zone (Active Upload State) -->
<div class="relative group cursor-pointer">
<div class="absolute inset-0 bg-primary/5 rounded-xl opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
<div class="border border-dashed border-outline-variant hover:border-primary/50 rounded-xl p-10 flex flex-col items-center justify-center gap-4 bg-surface-container-lowest/50 transition-colors duration-300 relative z-10">
<!-- Uploading State Visuals -->
<div class="relative w-16 h-16 flex items-center justify-center mb-2">
<div class="absolute inset-0 rounded-full bg-primary/20 blur-md animate-pulse"></div>
<span class="material-symbols-outlined text-[40px] text-primary relative z-10" data-icon="cloud_upload" style="font-variation-settings: 'FILL' 1;">cloud_upload</span>
</div>
<div class="text-center flex flex-col gap-2">
<span class="font-body-lg text-body-lg text-on-surface">cyberpunk_city_edit_v2.mp4</span>
<span class="font-label-caps text-label-caps text-on-surface-variant">Uploading... 65% • 12 seconds remaining</span>
</div>
<!-- Progress Bar -->
<div class="w-full max-w-sm mt-4">
<div class="h-[2px] w-full bg-surface-variant rounded-full overflow-hidden relative">
<!-- Glowing leading edge -->
<div class="absolute top-0 left-0 h-full bg-primary w-[65%] rounded-full shadow-[0_0_12px_theme(colors.primary)]"></div>
</div>
</div>
</div>
</div>
<!-- Form Fields Layout -->
<div class="flex flex-col gap-6">
<!-- Title Input -->
<div class="flex flex-col gap-3">
<label class="font-label-caps text-label-caps text-on-surface-variant px-2" for="title">Video Title</label>
<div class="relative">
<input class="w-full bg-surface-container-highest/50 border border-white/5 rounded-full px-6 py-4 font-body-lg text-body-lg text-on-surface placeholder:font-label-caps placeholder:text-label-caps placeholder:text-outline focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all" id="title" placeholder="GIVE YOUR VIDEO A CATCHY TITLE..." type="text" value="Neon Nights: Cyberpunk City Scape"/>
</div>
</div>
<!-- Description Textarea -->
<div class="flex flex-col gap-3">
<label class="font-label-caps text-label-caps text-on-surface-variant px-2" for="description">Description</label>
<div class="relative">
<textarea class="w-full bg-surface-container-highest/50 border border-white/5 rounded-xl px-6 py-4 font-body-lg text-body-lg text-on-surface placeholder:font-label-caps placeholder:text-label-caps placeholder:text-outline focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all resize-none" id="description" placeholder="TELL VIEWERS ABOUT YOUR CONTENT..." rows="3"></textarea>
</div>
</div>
<!-- Tags Input -->
<div class="flex flex-col gap-3">
<label class="font-label-caps text-label-caps text-on-surface-variant px-2" for="tags">Tags</label>
<div class="w-full bg-surface-container-highest/50 border border-white/5 rounded-xl p-4 flex flex-col gap-3 focus-within:border-primary/50 focus-within:ring-1 focus-within:ring-primary/50 transition-all">
<!-- Current Tags -->
<div class="flex flex-wrap gap-2">
<span class="flex items-center gap-1 bg-surface-container px-3 py-1.5 rounded-full font-label-caps text-label-caps text-on-surface-variant border border-white/5 hover:border-primary/50 hover:text-primary transition-colors cursor-pointer group">
                                    #cyberpunk
                                    <span class="material-symbols-outlined text-[14px] opacity-0 group-hover:opacity-100 transition-opacity" data-icon="close">close</span>
</span>
<span class="flex items-center gap-1 bg-surface-container px-3 py-1.5 rounded-full font-label-caps text-label-caps text-on-surface-variant border border-white/5 hover:border-primary/50 hover:text-primary transition-colors cursor-pointer group">
                                    #aesthetic
                                    <span class="material-symbols-outlined text-[14px] opacity-0 group-hover:opacity-100 transition-opacity" data-icon="close">close</span>
</span>
<span class="flex items-center gap-1 bg-surface-container px-3 py-1.5 rounded-full font-label-caps text-label-caps text-on-surface-variant border border-white/5 hover:border-primary/50 hover:text-primary transition-colors cursor-pointer group">
                                    #lumina_creators
                                    <span class="material-symbols-outlined text-[14px] opacity-0 group-hover:opacity-100 transition-opacity" data-icon="close">close</span>
</span>
</div>
<!-- Input area -->
<input class="w-full bg-transparent border-none p-0 font-label-caps text-label-caps text-on-surface placeholder:text-outline focus:ring-0" id="tags" placeholder="ADD TAGS AND PRESS ENTER..." type="text"/>
</div>
</div>
</div>
</div>
<!-- Footer Actions -->
<footer class="flex justify-end gap-4 px-8 py-6 border-t border-white/5 bg-surface-container/50 relative z-30">
<button class="bg-transparent border border-outline-variant hover:border-primary/50 text-on-surface hover:text-primary font-label-caps text-label-caps rounded-full px-8 py-3 transition-colors focus:outline-none focus:ring-2 focus:ring-primary/30">
                    CANCEL
                </button>
<button class="bg-primary text-on-primary font-label-caps text-label-caps rounded-full px-8 py-3 opacity-50 cursor-not-allowed hover:bg-primary-fixed focus:outline-none focus:ring-2 focus:ring-primary/50 transition-colors" disabled="">
                    PUBLISH
                </button>
</footer>
</div>
</main>
</body></html>
