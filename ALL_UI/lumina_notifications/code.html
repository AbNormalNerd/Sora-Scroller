<!-- Simulated App Background for Context -->
<div class="absolute inset-0 z-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(circle at 50% 50%, rgba(137, 206, 255, 0.15) 0%, transparent 60%);"></div>

<div class="relative z-50 w-full max-w-md mx-margin-mobile md:mx-0">

<div class="bg-surface-container-high/70 backdrop-blur-xl border border-white/10 rounded-xl overflow-hidden shadow-[0_8px_32px_rgba(0,0,0,0.5)] relative before:absolute before:inset-0 before:rounded-xl before:shadow-[inset_0_1px_0_rgba(255,255,255,0.1)] before:pointer-events-none">

<h2 class="font-title-md text-title-md text-on-surface tracking-wide">Notifications</h2>
<button class="font-label-caps text-label-caps text-primary hover:text-primary-fixed transition-colors uppercase tracking-widest focus:outline-none">
                    Mark all read
                </button>
</div>

<div class="flex flex-col max-h-[614px] overflow-y-auto no-scrollbar py-2">

<div class="absolute left-0 top-0 bottom-0 w-1 bg-primary rounded-r-full opacity-100"></div>
<div class="relative flex-shrink-0">

<span class="material-symbols-outlined text-[12px] text-primary icon-fill" data-icon="person_add">person_add</span>
</div>
</div>
<div class="flex-1 min-w-0 flex flex-col justify-center">
<p class="font-body-sm text-body-sm text-on-surface leading-snug">
<span class="font-semibold text-white">Elena_V</span> started following you.
                        </p>
<p class="font-body-sm text-body-sm text-primary mt-0.5 text-[12px]">2m ago</p>
</div>
</div>
<!-- Item 2: Like on Video -->
<div class="flex items-start gap-4 px-6 py-4 hover:bg-white/5 transition-colors cursor-pointer group">
<div class="relative flex-shrink-0">
<div class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center border border-white/10">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="favorite">favorite</span>
</div>
</div>
<div class="flex-1 min-w-0 flex flex-col justify-center">
<p class="font-body-sm text-body-sm text-on-surface-variant leading-snug">
<span class="font-semibold text-on-surface">Kael_Tech</span> liked your video.
                        </p>
<p class="font-body-sm text-body-sm text-outline mt-0.5 text-[12px]">1h ago</p>
</div>
<div class="flex-shrink-0 ml-2">
<img alt="Thumbnail" class="w-10 h-14 rounded object-cover border border-white/10 opacity-80 group-hover:opacity-100 transition-opacity" data-alt="Abstract 3D rendering of sleek, geometric glass shapes floating in a dark, atmospheric void. The surfaces reflect subtle, ethereal baby blue and stark white light. The composition is minimal and highly structured, evoking a sense of digital calm and premium technological precision." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCnpXKrHax7TmWUOkNVocCn-DbczuYq9NkzbkdneNo_W9s7_Ln-xrTAi40o55K_gR_C2oOclzQoPh3H9Tcc9vkNZLTilGvSz6SDs8cD0iyvRhWcGulVna4kHPXUJonIpMeelRSfZkmeB8Ak69Bwn55gM0R0NlWd6_kPxmsGvbM8Wk-vsIdR62l48keC3_uuTaVeg2wUINfF15JKKTYCLsJrtAzhqJNSntFrS3iD151KsBm-0I1bJJhgS2uL8L9rFNA_Usrie_7bXag"/>
</div>
</div>

<div class="absolute left-0 top-0 bottom-0 w-1 bg-primary rounded-r-full opacity-100"></div>
<div class="relative flex-shrink-0">
<img alt="Avatar" class="w-12 h-12 rounded-full object-cover border border-white/10" data-alt="A moody, high-contrast portrait of a man looking intently at the viewer. The environment is pitch black, illuminated only by a sleek, linear baby blue light source that creates sharp highlights on his face. The aesthetic is extremely modern, minimal, and evocative of a premium digital interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCWMIr5H-p_iKJE2FHr-Qt7qo9fuNDQzk7Jokltzvl_gm4OabvWeozo-jopIJ9teLabvLfXX_ez59Ux1Fg47Q8blbRAMXVIGcpgrJlD5VHRS4U3xPZgoOLl7vCdgqx8h39-jOIWYvhVxKFz911_vPDOFCYkRAsj9XWfpkf3tCw6JEi4BTPORfqSspEaGldqH_tsSFKhBe7Tyx67hBZTFIVHqjl-wVmqfY6FxnudwlhrM60nHDG3Ep42zI8hTIwI_osQPVhmNV0fo5s"/>

<span class="material-symbols-outlined text-[12px] text-secondary icon-fill" data-icon="alternate_email">alternate_email</span>
</div>
</div>
<div class="flex-1 min-w-0 flex flex-col justify-center">
<p class="font-body-sm text-body-sm text-on-surface leading-snug">
<span class="font-semibold text-white">Jax_Motion</span> mentioned you in a comment: <span class="text-on-surface-variant italic">"This edit is insane ⚡️"</span>
</p>
<p class="font-body-sm text-body-sm text-primary mt-0.5 text-[12px]">3h ago</p>
</div>
</div>
<!-- Item 4: System Notification -->
<div class="flex items-start gap-4 px-6 py-4 hover:bg-white/5 transition-colors cursor-pointer group">
<div class="relative flex-shrink-0">
<div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center border border-primary/20">
<span class="material-symbols-outlined text-primary" data-icon="bolt">bolt</span>
</div>
</div>
<div class="flex-1 min-w-0 flex flex-col justify-center">
<p class="font-body-sm text-body-sm text-on-surface-variant leading-snug">
<span class="font-semibold text-on-surface">Lumina Studio</span> updated.
                        </p>
<p class="font-body-sm text-body-sm text-outline mt-0.5 text-[12px]">Yesterday</p>
</div>

<button class="font-label-caps text-label-caps text-on-surface-variant hover:text-white transition-colors uppercase tracking-widest flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]" data-icon="settings">settings</span>
